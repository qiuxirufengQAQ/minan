server:
  port: 8082
  servlet:
    context-path: /api

spring:
  application:
    name: minan-game
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/minan_game2?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ""
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  web:
    resources:
      static-locations: file:${upload.path},classpath:/static/
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# 上传文件配置
upload:
  path: ${UPLOAD_PATH:/root/.openclaw/workspace/data/minan/uploads}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.minan.game.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.minan.game: debug

# AES 加密配置（生产环境请通过环境变量覆盖）
app:
  aes:
    key: ${AES_ENCRYPTION_KEY:MinanDefaultKey2025!@#$}

# 跨域配置（开发环境）
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
