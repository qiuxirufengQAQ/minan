# LianAI 后端应用配置文件 (application-prod.yml)

spring:
  application:
    name: lianai-game
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:lianai_game1}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# Sa-Token 配置
sa-token:
  # token 名称
  token-name: Authorization
  # token 有效期 (秒)
  timeout: 259200
  # token 最低活跃时间 (秒)
  active-timeout: 1800
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token
  is-share: false
  # token 风格
  token-style: uuid
  # 是否输出日志
  is-log: true

# 服务器端口
server:
  port: ${SERVER_PORT:8081}

# 日志配置
logging:
  level:
    com.lianai: INFO
  file:
    name: /var/www/lianai1/logs/backend.log
