components:
  schemas:
    Response:
      type: object
      properties:
        code:
          type: integer
          description: 响应码，0表示成功，非0表示失败
        message:
          type: string
          description: 响应消息
        data:
          type: object
          description: 响应数据

    Level:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 关卡ID
        levelId:
          type: string
          description: 关卡唯一标识符
        name:
          type: string
          description: 关卡名称
        order:
          type: integer
          description: 关卡顺序
        description:
          type: string
          description: 关卡描述
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间

    Scene:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 场景ID
        sceneId:
          type: string
          description: 场景唯一标识符
        levelId:
          type: string
          description: 关联的关卡ID
        name:
          type: string
          description: 场景名称
        order:
          type: integer
          description: 场景顺序
        background:
          type: string
          description: 场景背景
        imageUrl:
          type: string
          description: 场景图片URL
        thumbnailUrl:
          type: string
          description: 场景缩略图URL
        technique:
          type: string
          description: 知识点名称
        coreConcept:
          type: string
          description: 知识点核心概念
        maxScore:
          type: number
          format: double
          description: 场景满分
        isActive:
          type: integer
          description: 是否激活
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间

    Prompt:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 提示词ID
        promptId:
          type: string
          description: 提示词唯一标识符
        sceneId:
          type: string
          description: 关联的场景ID
        template:
          type: string
          description: 提示词模板
        evaluationDimensions:
          type: string
          description: 评估维度（JSON格式）
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间

    Achievement:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 成就ID
        achievementId:
          type: string
          description: 成就唯一标识符
        name:
          type: string
          description: 成就名称
        description:
          type: string
          description: 成就描述
        condition:
          type: string
          description: 触发条件（JSON格式）
        iconUrl:
          type: string
          description: 成就图标URL
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
